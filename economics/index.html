<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>From Field Dynamics to Extractive Systems</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #7ee08f;
  font-family: monospace;
  overflow: hidden;
}

/* darker scanlines */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.35) 2px,
    rgba(0,0,0,0.35) 4px
  );
  pointer-events: none;
}

#scope {
  position: absolute;
  left: 50%;
  top: 45%;
  transform: translate(-50%, -50%);
  width: min(80vw, 500px);
  height: min(80vw, 500px);
  border-radius: 50%;
}

#subtitle {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  width: 90vw;
  text-align: center;
  color: rgba(180,255,190,0.75);
  font-size: 14px;
  line-height: 1.5;
}

#status {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(120,200,130,0.4);
}

#essayLink {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(120,210,130,0.5);
  text-decoration: none;
}
</style>
</head>

<body>

<canvas id="scope"></canvas>
<div id="subtitle"></div>
<div id="status">INIT</div>

<a id="essayLink" href="field_dynamics.pdf" target="_blank">
From Field Dynamics to Extractive Systems
</a>

<audio id="audio" preload="auto" playsinline webkit-playsinline controls style="display:none">
  <source id="audioSource">
</audio>

<script>
const RAW_MP3 = "From Field Dynamics to Extractive Systems (The_physics_of_toxic_digital_platforms.mp3)";
const RAW_VTT = "From Field Dynamics to Extractive Systems (The_physics_of_toxic_digital_platforms.vtt)";

/* ✅ encode filenames safely */
const MP3 = encodeURI(RAW_MP3);
const VTT = encodeURI(RAW_VTT);

/* ---------- audio setup ---------- */

const audio = document.getElementById("audio");
const source = document.getElementById("audioSource");

source.src = MP3;
audio.load();

/* ---------- UI ---------- */

const subEl = document.getElementById("subtitle");
const statusEl = document.getElementById("status");

/* ---------- audio context ---------- */

let ctx, analyser, timeBuf;

async function ensureAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();
    analyser.fftSize = 2048;
    timeBuf = new Uint8Array(analyser.fftSize);

    const src = ctx.createMediaElementSource(audio);
    src.connect(analyser);
    analyser.connect(ctx.destination);
  }

  if (ctx.state === "suspended") await ctx.resume();
}

/* ---------- FORCE PLAY ON TOUCH ---------- */

window.addEventListener("pointerdown", async () => {
  await ensureAudio();

  if (audio.paused) {
    audio.play().catch(e => console.warn("play fail", e));
  }
});

/* ---------- subtitles (manual VTT) ---------- */

let cues = [];

function parseTime(t) {
  const p = t.trim().replace(",", ".").split(":").map(Number);
  return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2]
       : p.length === 2 ? p[0]*60 + p[1]
       : Number(t) || 0;
}

function parseVTT(text) {
  const blocks = text.replace(/\r/g,"").split(/\n\n+/);
  const out = [];

  for (const b of blocks) {
    const lines = b.split("\n").filter(Boolean);
    if (!lines.length) continue;

    const i = lines.findIndex(l => l.includes("-->"));
    if (i === -1) continue;

    const [a,b2] = lines[i].split("-->");
    const start = parseTime(a);
    const end   = parseTime(b2.split(" ")[0]);

    const txt = lines.slice(i+1).join("\n");
    if (txt) out.push({start,end,text:txt});
  }

  return out;
}

async function loadSubs() {
  try {
    const res = await fetch(VTT);
    const txt = await res.text();
    cues = parseVTT(txt);

    statusEl.textContent = "SUBS " + cues.length;
  } catch (e) {
    console.warn(e);
    statusEl.textContent = "NO SUBS";
  }
}

function updateSubs() {
  const t = audio.currentTime;

  for (let i = 0; i < cues.length; i++) {
    const c = cues[i];
    if (t >= c.start && t <= c.end) {
      subEl.textContent = c.text;
      return;
    }
  }

  subEl.textContent = "";
}

/* ---------- audio events ---------- */

audio.addEventListener("timeupdate", updateSubs);
audio.addEventListener("seeked", updateSubs);

audio.addEventListener("play", () => statusEl.textContent = "PLAY");
audio.addEventListener("pause", () => statusEl.textContent = "PAUSE");

/* ---------- visuals (darker + electric arcs) ---------- */

const canvas = document.getElementById("scope");
const ctx2 = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx2.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
resize();
window.addEventListener("resize", resize);

function bolt(x1,y1,x2,y2,intensity) {
  ctx2.beginPath();
  ctx2.moveTo(x1,y1);

  for (let i=0;i<10;i++) {
    const t=i/10;
    const x = x1+(x2-x1)*t + (Math.random()-0.5)*20*intensity;
    const y = y1+(y2-y1)*t + (Math.random()-0.5)*20*intensity;
    ctx2.lineTo(x,y);
  }

  ctx2.lineTo(x2,y2);

  ctx2.strokeStyle = `rgba(120,255,140,${0.2+intensity*0.3})`;
  ctx2.lineWidth = 1 + intensity;
  ctx2.stroke();
}

function draw() {
  ctx2.fillStyle = "rgba(0,0,0,0.3)";
  ctx2.fillRect(0,0,canvas.width,canvas.height);

  let energy = 0.1;

  if (analyser) {
    analyser.getByteTimeDomainData(timeBuf);

    let sum = 0;
    for (let i=0;i<timeBuf.length;i++) {
      const d = timeBuf[i]-128;
      sum += d*d;
    }
    energy = Math.min(sum/timeBuf.length/8000,1);
  }

  const cx = canvas.clientWidth/2;
  const cy = canvas.clientHeight/2;

  for (let i=0;i<6+energy*10;i++) {
    const a = Math.random()*Math.PI*2;
    const r = 80 + Math.random()*120;

    const x = cx + Math.cos(a)*r;
    const y = cy + Math.sin(a)*r;

    bolt(cx,cy,x,y,energy);
  }

  requestAnimationFrame(draw);
}

/* ---------- init ---------- */

loadSubs();
draw();
</script>
</body>
</html>
